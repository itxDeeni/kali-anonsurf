# /etc/anonsurf/anonsurf.conf - kali-anonsurf configuration
# This file is sourced by /etc/init.d/anonsurf on startup

# --- Tor settings ---
# UID that Tor runs as
TOR_UID="debian-tor"
# Tor TransPort for transparent proxying
TOR_PORT="9040"
# Tor SOCKS port
TOR_SOCKS_PORT="9050"
# Tor DNS port
TOR_DNS_PORT="53"

# --- Network exclusions ---
# Subnets that bypass Tor (space separated)
TOR_EXCLUDE="192.168.0.0/16 172.16.0.0/12 10.0.0.0/8"

# --- DNS ---
# Primary DNS (127.0.0.1 routes through Tor's DNSPort)
DNS_SERVERS="127.0.0.1"
# Fallback DNS if Tor DNS is unavailable
DNS_FALLBACK="209.222.18.222 209.222.18.218"

# --- Application control ---
# Apps killed on "anonsurf start" (space separated)
KILL_APPS="chrome dropbox iceweasel skype icedove thunderbird firefox chromium xchat transmission deluge pidgin pidgin.orig"
# Bleachbit cleaners run on start (space separated)
BLEACHBIT_CLEANERS="adobe_reader.cache chromium.cache chromium.current_session chromium.history elinks.history emesene.cache epiphany.cache firefox.url_history flash.cache flash.cookies google_chrome.cache google_chrome.history links2.history opera.cache opera.search_history opera.url_history"

# --- IPv6 ---
# Disable IPv6 while proxy is active
DISABLE_IPV6=true

# --- MAC spoofing (requires macchanger) ---
MAC_SPOOF=false
MAC_INTERFACES="eth0 wlan0"

# --- Tor bridges (pipe-separated, e.g. "obfs4 1.2.3.4:1234 CERT cert=...|obfs4 5.6.7.8:5678 CERT cert=...") ---
TOR_BRIDGES=""

# --- Logging ---
LOG_ENABLED=true
LOG_FILE="/var/log/anonsurf.log"

# --- Lock file ---
LOCK_FILE="/var/lock/anonsurf"
